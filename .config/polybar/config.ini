[colors]
background = #aa2F343F
background-alt = #444
foreground = ${xrdb:color7:#222}
foreground-alt = #000000
primary = #ffb52a
secondary = #e60053
alert = #bd2c40

[bar/mybar]

width = 100%
height = 27
fixed-center = false
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3
line-color = #f00

module-margin-left = 1
module-margin-right = 2

font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:size=8:antialias=false;0
font-2 = siji:pixelsize=10;1

modules-left = i3
modules-center =spotify mpd
modules-right = pulseaudio network wlan    memory cpu date

tray-position = right
tray-padding = 2

wm-restack = i3

cursor-click = pointer
cursor-scroll = ns-resize

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false


label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}
; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÓÄ¶ "
format-prefix-foreground = ${colors.foreground-alt}
label =%percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓÄ® "
format-prefix-foreground = ${colors.foreground-alt}
label =%percentage_used%%

[module/network]
type = internal/network
interface = enp8s0
interval = 3.0
format-connected = <label-connected>
label-connected = %downspeed%   %upspeed% |

[module/wlan]
type = internal/network
interface = wlp0s20u3
interval = 3.0
format-connected = <label-connected>
label-connected = %essid%: ‚Üď%downspeed%   ‚ÜĎ%upspeed%    |

[module/date]
type = internal/date
format-prefix="|"
format-suffix="|"
interval =1 
date =
date-alt = " %Y-%m-%d"
time = %H:%M
time-alt = %H:%M:%S
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume> 
label-volume ="%percentage%% |"
label-volume-foreground = ${root.foreground}

label-muted = ūüĒá muted
label-muted-foreground = #ffffff

;[module/battery]
;type = internal/battery
;battery = BAT1
;adapter = ACAD
;full-at = 98
;
;format-charging = <animation-charging> <label-charging>
;format-charging-underline = #110080
;
;format-discharging = <animation-discharging> <label-discharging>
;format-discharging-underline =#800000 
;format-full-prefix = "Óąļ "
;format-full-prefix-foreground = ${colors.foreground-alt}
;format-full-underline =#008000 
;
;ramp-capacity-0 = Óą∂
;ramp-capacity-1 = Óą∑
;ramp-capacity-2 = Óął
;ramp-capacity-foreground = ${colors.foreground-alt}
;
;animation-charging-0 = Óą∂
;animation-charging-1 = Óą∑
;animation-charging-2 = Óął
;animation-charging-foreground = ${colors.foreground-alt}
;animation-charging-framerate = 750
;
;animation-discharging-0 = Óął
;animation-discharging-1 = Óą∑
;animation-discharging-2 = Óą∂
;animation-discharging-foreground = ${colors.foreground-alt}
;animation-discharging-framerate = 750
;
[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = ÓĄĆ
label-open-foreground = ${colors.secondary}
label-close = ÓĀ• cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[module/spotify]
type = custom/script
interval = 1
format = <label>
exec = python ~/.config/polybar/polybar-spotify.py -f '{artist}: {song}'
format-underline = #1db954
click-right= playerctl --player=spotify next
click-left= playerctl --player=spotify previous
click-middle= playerctl --player=spotify play-pause

[global/wm]
;margin-top = 5
;margin-bottom = 5

; vim:ft=dosini
[module/mpd]
type = internal/mpd
interval = 2
host =127.0.0.16 
port = 6660
format = <label>
enable-ipc = true
click-left= playertctl --player=mpd play-pause
